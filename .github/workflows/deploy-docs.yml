name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['docs/**']
  pull_request:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup pnpm
        timeout-minutes: 3
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        timeout-minutes: 3
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'docs/pnpm-lock.yaml'

      - name: Install dependencies
        timeout-minutes: 5
        working-directory: ./docs
        run: pnpm install

      - name: Build docs
        timeout-minutes: 10
        working-directory: ./docs
        run: pnpm build

      - name: Upload artifact
        timeout-minutes: 3
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/.vuepress/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        timeout-minutes: 10
        id: deployment
        uses: actions/deploy-pages@v5
